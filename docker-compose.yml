services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrocontrol}
      POSTGRES_USER: ${POSTGRES_USER:-agrocontrol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrocontrol}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrocontrol}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    # entrypoint.sh runs migrate + seed_demo, then this command starts the dev server
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: ./backend
    entrypoint: []
    command: celery -A config worker -B -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8001/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata:
